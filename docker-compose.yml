services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: sentinel-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok"
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    healthcheck:
      test: echo ruok | nc localhost 2181 | grep imok
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: sentinel-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_MESSAGE_MAX_BYTES: 10485760
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server localhost:9092
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: sentinel-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: sentinel-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181

  timescaledb:
    build:
      context: .
      dockerfile: Dockerfile.timescale
    container_name: sentinel-timescaledb
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      # [CRITICAL FIX]: Remove static credentials. Interpolate from host .env variables.
      POSTGRES_USER: ${POSTGRES_USER:-sentinel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sentinel_local_dev}
      POSTGRES_DB: ${POSTGRES_DB:-sentinel}
    command: postgres -c shared_preload_libraries=timescaledb
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./shared/db/init.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: pg_isready -U ${POSTGRES_USER:-sentinel} -d ${POSTGRES_DB:-sentinel}
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  neo4j:
    image: neo4j:5.13
    container_name: sentinel-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      # [CRITICAL FIX]: Parameterized auth.
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-sentinel_graph}
      NEO4J_PLUGINS: '["apoc"]'
      # [CRITICAL FIX]: Severely restrict APOC execution. Removes apoc.export.* and apoc.load.* # which are common attack vectors for Remote Code Execution / Host file exfiltration.
      NEO4J_dbms_security_procedures_unrestricted: apoc.meta.*,apoc.algo.*,apoc.spatial.*,apoc.coll.*
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1g
      NEO4J_dbms_memory_pagecache_size: 512m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 30s

  redis:
    image: redis:7.2-alpine
    container_name: sentinel-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: redis-cli ping || exit 1
      interval: 5s
      timeout: 3s
      retries: 15
  
  migrator:
    build: .
    command: python shared/db/migrate.py
    environment:
      - PYTHONPATH=/app
    env_file: .env
    restart: "no"
    depends_on:
      timescaledb:
        condition: service_healthy
  
  enrichment:
    build:
      context: .
      dockerfile: ml.Dockerfile
    container_name: sentinel-enrichment
    command: python services/enrichment/main.py
    env_file: .env
    restart: always
    depends_on:
      migrator:
        condition: service_completed_successfully
      timescaledb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy

  correlation:
    build:
      context: .
      dockerfile: ml.Dockerfile
    container_name: sentinel-correlation
    command: python services/correlation/main.py
    env_file: .env
    restart: always
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      qdrant:
        condition: service_started

  reasoning:
    build:
      context: .
      dockerfile: ml.Dockerfile
    container_name: sentinel-reasoning
    command: python services/reasoning/main.py
    env_file: .env
    restart: always
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
      neo4j:
        condition: service_healthy
  
  collector-tradefi:
    build: .
    container_name: sentinel-tradfi
    command: python services/collector-tradfi/main.py
    env_file: .env
    restart: always
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy

  collector-crypto:
    build: .
    container_name: sentinel-crypto
    command: python services/collector-crypto/main.py
    env_file: .env
    restart: always
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy

  collector-prediction:
    build: .
    container_name: sentinel-prediction
    command: python services/collector-prediction/main.py
    env_file: .env
    restart: always
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    container_name: sentinel-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy

  qdrant:
    image: qdrant/qdrant:latest
    container_name: sentinel-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      disable: true

  collector-cyber:
    build: .
    container_name: sentinel-cyber
    command: python services/collector-cyber/main.py
    env_file: .env
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
  
  collector-radar:
    build: .
    command: "python services/collector-radar/main.py"
    container_name: sentinel-radar
    env_file: .env
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
  
  collector-ais:
    build: .
    container_name: sentinel-ais
    command: python services/collector-ais/main.py
    env_file: .env
    restart: always
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy

  collector-adsb:
    build: .
    container_name: sentinel-adsb
    command: python services/collector-adsb/main.py
    env_file: .env
    restart: always
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy

  collector-news:
    build: .
    container_name: sentinel-news
    command: python services/collector-news/main.py
    env_file: .env
    restart: always
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy

  api-gateway:
    build: .
    container_name: sentinel-api_gateway
    command: uvicorn services.api_gateway.routes.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    ports:
      - "8000:8000"
    restart: always
    depends_on:
      timescaledb:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy

  agents:
    build:
      context: .
      dockerfile: ml.Dockerfile
    container_name: sentinel-agents
    command: python services/agents/main.py
    env_file: .env
    restart: always
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      ollama:
        condition: service_healthy

volumes:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  timescaledb_data:
  neo4j_data:
  neo4j_logs:
  redis_data:
  ollama_data:
  qdrant_data:

networks:
  default:
    name: sentinel-network